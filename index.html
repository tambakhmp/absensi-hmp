<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>PT. HUTAKALO MINATANI PRIMA</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none}
    html,body{height:100%;width:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0f172a}
    body{display:flex;align-items:center;justify-content:center;padding:1rem;color:#f1f5f9;background:url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover no-repeat fixed}
    body::before{content:'';position:fixed;inset:0;background:rgba(15,23,42,0.65);z-index:0}
    .card{position:relative;z-index:1;background:rgba(30,41,59,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2.5rem 1.5rem;width:100%;max-width:380px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 25px 50px rgba(0,0,0,0.5);animation:up 0.5s ease-out}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .logo{width:85px;height:85px;border-radius:20px;margin:0 auto 1.2rem;display:block;object-fit:contain;background:#fff;padding:5px;box-shadow:0 8px 20px rgba(0,0,0,0.3)}
    h1{font-size:1.1rem;font-weight:800;margin-bottom:.3rem;line-height:1.3}
    .sub{font-size:.85rem;color:#94a3b8;margin-bottom:1.5rem}
    .ring-wrap{margin-bottom:1.5rem}
    .ring{width:70px;height:70px;margin:0 auto .5rem;position:relative}
    .ring svg{transform:rotate(-90deg)}
    .track{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5}
    .prog{fill:none;stroke:#3b82f6;stroke-width:5;stroke-linecap:round;stroke-dasharray:157;transition:stroke-dashoffset 1s linear}
    .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#3b82f6}
    .lbl{font-size:.75rem;color:#94a3b8}
    .btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1rem;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border-radius:16px;font-size:0.95rem;font-weight:700;text-decoration:none;transition:all 0.2s}
    .btn.go{background:linear-gradient(135deg,#10b981,#059669)}
    #installBanner{display:none !important} /* Sembunyikan banner sesuai permintaan */
  </style>
</head>
<body>
<div class="card">
  <img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4" alt="Logo">
  <h1>PT. HUTAKALO MINATANI PRIMA</h1>
  <p class="sub">Sistem Absensi Karyawan Digital</p>
  <div class="ring-wrap">
    <div class="ring"><svg viewBox="0 0 56 56" width="70" height="70"><circle class="track" cx="28" cy="28" r="25"/><circle class="prog" cx="28" cy="28" r="25" id="pRing"/></svg><div class="num" id="cNum">3</div></div>
    <div class="lbl" id="cLbl">Mengarahkan dalam <b>3</b> detik...</div>
  </div>
  <a id="btnGo" class="btn" href="app.html">🚀 <span id="btnTxt">Membuka Aplikasi...</span></a>
</div>
<script>
  var cur=3,circ=2*Math.PI*25,ring=document.getElementById('pRing');
  ring.style.strokeDashoffset='0';
  function upd(v){ring.style.strokeDashoffset=circ*(1-v/3);}
  var t=setInterval(function(){
    cur--;
    document.getElementById('cNum').textContent=cur>0?cur:'✓';
    upd(cur);
    if(cur<=0){
      clearInterval(t);
      document.getElementById('btnGo').className='btn go';
      document.getElementById('btnTxt').textContent='Buka Aplikasi';
      setTimeout(function(){ window.location.href='app.html'; }, 300);
    }
  },1000);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
