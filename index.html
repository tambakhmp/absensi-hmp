<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Absensi HMP</title>

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* SPLASH SCREEN */
.splash{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeOut 1s ease 2.5s forwards;
}

.logo{
  width:90px;
  margin-bottom:15px;
  animation:zoom 1s ease;
}

@keyframes zoom{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1);opacity:1}
}

.title{
  color:#fff;
  font-weight:700;
  font-size:16px;
}

.loading{
  margin-top:20px;
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* HIDDEN APP (backup UI) */
.app{
  display:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div class="splash">
  <img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">
  <div class="title">Absensi HMP</div>
  <div class="loading"></div>
</div>

<!-- BACKUP (kalau redirect gagal) -->
<div class="app">
  <h2 style="color:white;text-align:center">Membuka aplikasi...</h2>
</div>

<script>
let url="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec";

/* redirect setelah splash */
setTimeout(()=>{
  window.location.replace(url);
},3000);

/* PWA install */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
