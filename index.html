<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PT. HUTAKALO MINATANI PRIMA — Absensi</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Segoe UI",system-ui,sans-serif}

body{
  background:#0f172a url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover fixed;
  color:#f1f5f9;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:1rem;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:rgba(0,0,0,.45);
}

.card{
  position:relative;
  background:rgba(15,23,42,.92);
  border-radius:20px;
  padding:2.2rem 1.8rem;
  width:100%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(16px);
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.logo{
  width:80px;height:80px;border-radius:16px;
  margin:0 auto 1rem;
}

h1{font-size:1.1rem;font-weight:800}
.sub{font-size:.8rem;color:#94a3b8;margin-bottom:1.2rem}

.status{
  display:flex;justify-content:center;gap:.4rem;
  font-size:.75rem;color:#94a3b8;
  margin-bottom:1.2rem
}

.dot{
  width:7px;height:7px;background:#22c55e;border-radius:50%;
}

.ring{width:60px;height:60px;margin:auto;position:relative}
.num{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;color:#3b82f6
}

.lbl{font-size:.7rem;margin-bottom:1rem;color:#94a3b8}

.btn{
  display:block;
  width:100%;
  padding:.8rem;
  background:#3b82f6;
  color:#fff;
  border-radius:10px;
  margin-bottom:.5rem;
  text-decoration:none;
}

.btn-sec{
  display:block;
  width:100%;
  padding:.7rem;
  background:#1e293b;
  border-radius:10px;
  margin-bottom:1rem;
  text-decoration:none;
  color:#fff;
}

.feats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.4rem
}

.feat{
  font-size:.7rem;
  padding:.3rem;
  background:#111827;
  border-radius:6px
}

.footer{
  font-size:.65rem;
  text-align:center;
  margin-top:.8rem;
}

/* 🔥 MOBILE FIX */
@media (max-width:480px){

  body{
    background-attachment:scroll;
    padding:.6rem;
  }

  .card{
    padding:1.4rem 1rem;
    border-radius:14px;
  }

  .logo{width:60px;height:60px}
  h1{font-size:.95rem}
  .sub{font-size:.7rem}
  .btn{font-size:.85rem}
}
</style>
</head>

<body>

<div class="card">

<img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">

<h1>PT. HUTAKALO MINATANI PRIMA</h1>
<p class="sub">Sistem Absensi Karyawan</p>

<div class="status">
<div class="dot"></div> Sistem aktif
</div>

<div class="ring">
<div class="num" id="num">3</div>
</div>

<div class="lbl" id="lbl">Masuk dalam 3 detik...</div>

<a id="go" class="btn" href="#">Membuka...</a>

<a class="btn-sec" target="_blank"
href="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec">
Buka Manual
</a>

<div class="feats">
<div class="feat">📍 GPS</div>
<div class="feat">📷 Foto</div>
<div class="feat">📊 Excel</div>
<div class="feat">🔔 Notif</div>
</div>

</div>

<div class="footer">
© 2026 PT. HUTAKALO MINATANI PRIMA
</div>

<script>
let url="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec";
let n=3;

let t=setInterval(()=>{
n--;
document.getElementById("num").innerText=n>0?n:"✓";
document.getElementById("lbl").innerText=n>0?"Masuk dalam "+n+" detik...":"Membuka...";

if(n<=0){
clearInterval(t);
window.location.href=url;
}
},1000);
</script>

</body>
</html>
