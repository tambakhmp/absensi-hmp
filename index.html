<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Absensi HMP</title>

<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover no-repeat;
  color:#fff;
}

/* overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
}

/* card */
.card{
  position:relative;
  width:100%;
  max-width:360px;
  padding:20px;
  border-radius:18px;
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(15px);
  text-align:center;
}

/* logo */
.logo{
  width:70px;
  margin-bottom:10px;
}

h1{font-size:14px}
.sub{font-size:12px;color:#94a3b8;margin-bottom:10px}

/* install */
.install{
  display:none;
  background:#22c55e;
  padding:8px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

/* button */
.btn{
  display:block;
  padding:10px;
  background:#3b82f6;
  border-radius:10px;
  margin-top:10px;
  text-decoration:none;
  color:#fff;
}

/* mobile fix */
@media(max-width:480px){
  .card{margin:10px}
}
</style>
</head>

<body>

<div class="card">

<img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">

<h1>PT. HUTAKALO MINATANI PRIMA</h1>
<div class="sub">Sistem Absensi Digital</div>

<div id="install" class="install">📲 Install Aplikasi</div>

<a class="btn" href="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec">
🚀 Masuk Aplikasi
</a>

</div>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install').style.display = 'block';
});

document.getElementById('install').addEventListener('click', () => {
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
  });
});

/* service worker */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
