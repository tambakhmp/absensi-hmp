<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Absensi HMP</title>

<meta name="theme-color" content="#0f172a">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  background:#0f172a;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* SPLASH */
.splash{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.logo{
  width:80px;
  margin-bottom:15px;
}

.loading{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* APP FULLSCREEN */
.app{
  position:fixed;
  inset:0;
  display:none;
}

/* iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* TOP MASK (SEMBUNYIKAN HEADER GAS) */
.mask{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#0f172a;
  z-index:10;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">
  <div class="loading"></div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="mask"></div>
  <iframe src="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec"></iframe>
</div>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="block";
},2000);
</script>

</body>
</html>
