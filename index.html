<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>PT. HUTAKALO MINATANI PRIMA</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tambakhmp/absensi-hmp/main/icon-192.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tambakhmp/absensi-hmp/main/icon-192.png">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none}
    html,body{height:100%;width:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0f172a}
    body{display:flex;align-items:center;justify-content:center;padding:1rem;color:#f1f5f9;background:url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover no-repeat fixed}
    body::before{content:'';position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:0}
    
    .card{position:relative;z-index:1;background:rgba(30,41,59,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2.5rem 1.5rem;width:100%;max-width:380px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 25px 50px rgba(0,0,0,0.5);animation:up 0.5s ease-out}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    
    .logo{width:90px;height:90px;border-radius:22px;margin:0 auto 1.5rem;display:block;object-fit:contain;background:#fff;padding:8px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
    h1{font-size:1.1rem;font-weight:800;margin-bottom:.3rem;line-height:1.3}
    .sub{font-size:.85rem;color:#94a3b8;margin-bottom:1.5rem}
    
    .ring-wrap{margin-bottom:1.5rem}
    .ring{width:70px;height:70px;margin:0 auto .5rem;position:relative}
    .ring svg{transform:rotate(-90deg)}
    .track{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5}
    .prog{fill:none;stroke:#3b82f6;stroke-width:5;stroke-linecap:round;stroke-dasharray:157;transition:stroke-dashoffset 1s linear}
    .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#3b82f6}
    
    .btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1.1rem;color:#fff;border-radius:18px;font-size:1rem;font-weight:700;text-decoration:none;transition:all 0.2s;border:none;cursor:pointer}
    
    /* Tombol Buka (Hijau) */
    .btn-go{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 10px 20px rgba(16,185,129,0.3);display:none}
    
    /* Tombol Instal (Biru) */
    .btn-install{background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 10px 20px rgba(59,130,246,0.3);margin-top:10px;display:none}
    
    .footer{font-size:.7rem;color:rgba(148,163,184,0.4);margin-top:1.5rem}
  </style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://raw.githubusercontent.com/tambakhmp/absensi-hmp/main/icon-192.png" alt="Logo">
  <h1>PT. HUTAKALO MINATANI PRIMA</h1>
  <p class="sub">Sistem Absensi Karyawan Digital</p>

  <div class="ring-wrap">
    <div class="ring">
      <svg viewBox="0 0 56 56" width="70" height="70">
        <circle class="track" cx="28" cy="28" r="25"/>
        <circle class="prog" cx="28" cy="28" r="25" id="pRing"/>
      </svg>
      <div class="num" id="cNum">10</div>
    </div>
    <div id="cLbl" style="font-size:0.8rem;color:#94a3b8">Menyiapkan sistem...</div>
  </div>

  <a id="btnGo" class="btn btn-go" href="app.html">🚀 Buka Aplikasi</a>
  <button id="btnInstall" class="btn btn-install">📲 Pasang Aplikasi</button>
  
  <div class="footer">Verifikasi Perangkat & Keamanan Aktif</div>
</div>

<script>
  // DAFTARKAN SERVICE WORKER
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // LOGIKA TOMBOL INSTAL
  let deferredPrompt;
  const btnInstall = document.getElementById('btnInstall');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.style.display = 'flex'; // Munculkan tombol instal jika didukung
  });

  btnInstall.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') btnInstall.style.display = 'none';
      deferredPrompt = null;
    }
  });

  // LOGIKA COUNTDOWN (10 DETIK)
  var cur = 10; 
  var circ = 2 * Math.PI * 25;
  var ring = document.getElementById('pRing');
  ring.style.strokeDashoffset = '0';
  
  function upd(v) { 
    ring.style.strokeDashoffset = circ * (1 - v / 10); 
  }

  var t = setInterval(function() {
    cur--;
    document.getElementById('cNum').textContent = cur > 0 ? cur : '✓';
    document.getElementById('cLbl').textContent = cur > 0 ? 'Mengarahkan dalam ' + cur + ' detik...' : 'Sistem Siap!';
    upd(cur);
    
    if(cur <= 0) {
      clearInterval(t);
      document.getElementById('btnGo').style.display = 'flex';
      // Otomatis pindah ke app.html setelah 10 detik
      setTimeout(function() {
        window.location.href = 'app.html';
      }, 500);
    }
  }, 1000);
</script>

</body>
</html>
