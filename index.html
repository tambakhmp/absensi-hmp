<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PT. HUTAKALO MINATANI PRIMA — Absensi</title>
  <meta name="description" content="Sistem Absensi Karyawan Digital PT. HUTAKALO MINATANI PRIMA">
  
  <!-- Android & PWA Fullscreen Meta -->
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Absensi HMP">
  <meta name="display" content="standalone">
  
  <link rel="manifest" href="manifest.json">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tambakhmp.my.id">
  <meta property="og:title" content="PT. HUTAKALO MINATANI PRIMA — Absensi">
  <meta property="og:description" content="Sistem Absensi Karyawan Digital. Klik untuk masuk.">
  <meta property="og:image" content="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">
  <meta property="og:site_name" content="PT. HUTAKALO MINATANI PRIMA">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
    
    /* Full Android Viewport Fix */
    html,body{
      height: 100%;
      width: 100%;
      overflow: hidden; /* Menghilangkan scroll liar agar terasa seperti aplikasi native */
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body{
      background:#0f172a url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover no-repeat fixed;
      color:#f1f5f9;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:1rem;
      position:relative;
    }

    body::before{
      content:'';position:fixed;inset:0;
      background:rgba(15, 23, 42, 0.6); /* Sedikit lebih gelap agar teks kontras */
      z-index:0;
    }

    .card{
      position:relative;z-index:1;
      background:rgba(30, 41, 59, 0.85);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;padding:2.5rem 1.5rem;
      width:100%;max-width:380px;text-align:center;
      backdrop-filter:blur(20px);
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
      animation:up .5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    
    .logo{width:85px;height:85px;border-radius:20px;margin:0 auto 1.2rem;display:block;object-fit:contain;background:#fff;padding:5px;box-shadow:0 8px 20px rgba(0,0,0,0.3)}
    
    h1{font-size:1.1rem;font-weight:800;letter-spacing:0.5px;margin-bottom:.3rem;line-height:1.3}
    .sub{font-size:.85rem;color:#94a3b8;margin-bottom:1.5rem}
    
    .status{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.75rem;color:#cbd5e1;padding:.5rem 1rem;background:rgba(255,255,255,0.05);border-radius:50px;margin-bottom:1.5rem}
    .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;box-shadow:0 0 10px #22c55e;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

    /* UI Components */
    .ring-wrap{margin-bottom:1.5rem}
    .ring{width:70px;height:70px;margin:0 auto .5rem;position:relative}
    .ring svg{transform:rotate(-90deg)}
    .track{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5}
    .prog{fill:none;stroke:#3b82f6;stroke-width:5;stroke-linecap:round;stroke-dasharray:157;transition:stroke-dashoffset 1s linear}
    .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#3b82f6}
    .lbl{font-size:.75rem;color:#94a3b8}

    .btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1rem;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;border-radius:16px;font-size:0.95rem;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 10px 15px -3px rgba(59,130,246,0.3);margin-bottom:.8rem;transition:all 0.2s}
    .btn.go{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 10px 15px -3px rgba(16,185,129,0.3)}
    .btn:active{transform:scale(0.98)}

    .btn-sec{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.8rem;background:rgba(255,255,255,0.03);color:#e2e8f0;border:1px solid rgba(255,255,255,0.1);border-radius:14px;font-size:.85rem;font-weight:600;text-decoration:none;margin-bottom:1.2rem}

    .feats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .feat{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:#94a3b8;padding:.5rem;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px}

    /* Sembunyikan Banner Sesuai Permintaan */
    #installBanner { display: none !important; }

    .footer{font-size:.7rem;color:rgba(148,163,184,0.4);margin-top:1.5rem;position:relative;z-index:1}
  </style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4" alt="Logo">

  <h1>PT. HUTAKALO MINATANI PRIMA</h1>
  <p class="sub">Sistem Absensi Karyawan Digital</p>

  <div class="status">
    <div class="dot"></div>
    <span id="stTxt">Sistem aktif &amp; siap digunakan</span>
  </div>

  <!-- Banner disembunyikan via CSS -->
  <div id="installBanner"></div>

  <div class="ring-wrap">
    <div class="ring">
      <svg viewBox="0 0 56 56" width="70" height="70">
        <circle class="track" cx="28" cy="28" r="25"/>
        <circle class="prog"  cx="28" cy="28" r="25" id="pRing"/>
      </svg>
      <div class="num" id="cNum">3</div>
    </div>
    <div class="lbl" id="cLbl">Mengarahkan dalam <b>3</b> detik...</div>
  </div>

  <a id="btnGo" class="btn" href="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec">
    <span>🚀</span><span id="btnTxt">Membuka Aplikasi...</span>
  </a>
  
  <a class="btn-sec" href="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec" target="_blank">
    <span>↗️</span><span>Buka di Tab Baru</span>
  </a>

  <div class="feats">
    <div class="feat">📍 Absen GPS</div>
    <div class="feat">📷 Foto Selfie</div>
    <div class="feat (v2)">📊 Laporan Excel</div>
    <div class="feat">🔔 Notifikasi</div>
  </div>
</div>

<div class="footer">© 2026 PT. HUTAKALO MINATANI PRIMA</div>

<script>
  var APP='https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec';

  // Countdown Logic
  var cur=3, circ=2*Math.PI*25;
  var ring=document.getElementById('pRing');
  ring.style.strokeDashoffset='0';
  
  function upd(v){ ring.style.strokeDashoffset=circ*(1-v/3); }
  upd(3);

  var t=setInterval(function(){
    cur--;
    document.getElementById('cNum').textContent=cur>0?cur:'✓';
    document.getElementById('cLbl').innerHTML=cur>0?'Mengarahkan dalam <b>'+cur+'</b> detik...':'Membuka aplikasi...';
    upd(cur);
    if(cur<=0){
      clearInterval(t);
      document.getElementById('btnGo').className='btn go';
      document.getElementById('btnTxt').textContent='Buka Aplikasi Absensi';
      document.getElementById('stTxt').textContent='Mengarahkan ke aplikasi...';
      setTimeout(function(){ window.location.href=APP; }, 400);
    }
  }, 1000);

  // Service Worker Registration
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(e){ console.log(e); });
  }
</script>

</body>
</html>
