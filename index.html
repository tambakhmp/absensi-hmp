<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Absensi HMP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url('https://drive.google.com/uc?export=view&id=1EDBC6Mr1IE93ae3KHdttFKEDl_-2dvkq') center/cover no-repeat;
  color:#fff;
  overflow:hidden;
}

/* overlay blur */
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);
}

/* card */
.card{
  position:relative;
  width:100%;
  max-width:360px;
  padding:25px 20px;
  border-radius:20px;
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  text-align:center;
  animation:fadeUp .5s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{
  width:75px;
  height:75px;
  margin:auto;
  margin-bottom:12px;
  border-radius:15px;
}

h1{
  font-size:15px;
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:15px;
}

/* status */
.status{
  font-size:12px;
  margin-bottom:15px;
  color:#4ade80;
}

/* countdown circle */
.circle{
  width:70px;
  height:70px;
  margin:auto;
  border-radius:50%;
  border:3px solid #3b82f6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
  color:#3b82f6;
  margin-bottom:10px;
}

.text{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:15px;
}

/* button */
.btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  text-decoration:none;
  color:#fff;
  font-weight:600;
  display:block;
  margin-bottom:8px;
}

.btn2{
  width:100%;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  text-decoration:none;
  color:#fff;
  font-size:13px;
}

/* features */
.feats{
  margin-top:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

.feat{
  font-size:11px;
  padding:6px;
  background:rgba(255,255,255,.05);
  border-radius:8px;
}

/* footer */
.footer{
  position:absolute;
  bottom:10px;
  font-size:10px;
  opacity:.5;
}

/* mobile perfect */
@media(max-width:480px){
  .card{
    margin:10px;
    padding:20px 15px;
  }

  .circle{
    width:60px;
    height:60px;
  }
}
</style>
</head>

<body>

<div class="card">

<img class="logo" src="https://drive.google.com/uc?export=view&id=1wZTTly4WpgRdCvV6iPNEnLLN-dSRE8E4">

<h1>PT. HUTAKALO MINATANI PRIMA</h1>
<div class="sub">Sistem Absensi Digital</div>

<div class="status">● Sistem Aktif</div>

<div class="circle" id="num">3</div>
<div class="text" id="txt">Masuk dalam 3 detik...</div>

<a id="btn" class="btn">Membuka aplikasi...</a>

<a class="btn2" target="_blank"
href="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec">
Buka manual
</a>

<div class="feats">
<div class="feat">📍 GPS</div>
<div class="feat">📷 Selfie</div>
<div class="feat">📊 Laporan</div>
<div class="feat">🔔 Notifikasi</div>
</div>

</div>

<div class="footer">
© 2026 HMP
</div>

<script>
let url="https://script.google.com/macros/s/AKfycbwTwVOpHCHmGQKqlskpnruvHE-4ughPS_fLMp7hfayRtoYYbp6vSxDcSwZWxnm2iBr6/exec";

let n=3;

let t=setInterval(()=>{
n--;

document.getElementById("num").innerText=n>0?n:"✓";
document.getElementById("txt").innerText=n>0?"Masuk dalam "+n+" detik...":"Membuka aplikasi...";

if(n<=0){
clearInterval(t);
window.location.href=url;
}
},1000);
</script>

</body>
</html>
