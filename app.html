<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sistem Absensi HMP</title>
    <style>
        /* Menghilangkan semua jarak (margin/padding) bawaan browser */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll ganda */
            background-color: #0f172a; /* Warna latar belakang gelap sesuai tema Anda */
        }

        /* Iframe dibuat absolut agar benar-benar menempel ke tepi layar */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbwGjQUQoUTYNBfWWKLoUQ8L2iLVXkeGYVm2izAP7kgimCX39GwEPsEuYSJWEAULEHY6/exec" 
        allow="geolocation; camera; microphone"
        title="Absensi App">
    </iframe>

    <script>
        // Script tambahan untuk memastikan tinggi layar akurat di Android/iOS
        function fixFullHeight() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', fixFullHeight);
        fixFullHeight();
    </script>
</body>
</html>
