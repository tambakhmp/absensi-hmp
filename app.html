<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Absensi - PT. Hutakalo Minatani Prima</title>
    <style>
        /* Mengatur agar halaman web tidak memiliki jarak sisa */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll ganda di luar iframe */
            background-color: #000000; /* Warna latar belakang selaras dengan tema gelap */
        }

        /* Mengatur agar Iframe (Aplikasi GAS) memenuhi seluruh layar HP */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Masukkan LINK DEPLOY TERBARU dari Google Apps Script Anda di src di bawah ini -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxTNhF6lB65EFSBf3dlJFxA1enRmvPWbMe83QczEPI2omDPoBpeTYHIeL4zlZXXFpEc/exec" 
        allow="geolocation; camera; microphone"
        title="Absensi App">
    </iframe>

    <script>
        // Memastikan iframe selalu memenuhi layar meskipun orientasi layar berubah
        function adjustIframe() {
            const iframe = document.querySelector('iframe');
            if (iframe) {
                iframe.style.height = window.innerHeight + 'px';
                iframe.style.width = window.innerWidth + 'px';
            }
        }

        window.addEventListener('resize', adjustIframe);
        window.addEventListener('load', adjustIframe);
    </script>
</body>
</html>
