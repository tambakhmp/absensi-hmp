<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag diperketat dengan user-scalable=no untuk mencegah zoom otomatis saat mengetik -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Absensi HMP</title>
    <style>
        /* Reset standar */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #0f172a;
            /* Mencegah zoom dengan gestur cubit (optional tambahan) */
            touch-action: pan-x pan-y;
        }

        .container {
            position: absolute;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            display: flex;
            flex-direction: column;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Trik CSS untuk mencegah zoom otomatis pada input di dalam iframe (beberapa browser) */
        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Gunakan link GAS Anda -->
        <iframe src="https://script.google.com/macros/s/AKfycbxTNhF6lB65EFSBf3dlJFxA1enRmvPWbMe83QczEPI2omDPoBpeTYHIeL4zlZXXFpEc/exec" 
                allow="geolocation; camera; microphone"></iframe>
    </div>
</body>
</html>
